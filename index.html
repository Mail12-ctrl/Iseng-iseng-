<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Planet Adventure</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#050816,#0b0f2a,#111c44);
    color:white;
}

/* Background Stars */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://i.imgur.com/YKY28eT.png');
    animation:moveStars 100s linear infinite;
    opacity:0.7;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:-10000px 5000px;}
}

/* Planet */
.planet{
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#4facfe,#00f2fe,#001f4d);
    box-shadow:0 0 60px cyan;
    top:10%;
    right:10%;
    animation:floatPlanet 6s ease-in-out infinite;
}

@keyframes floatPlanet{
    0%{transform:translateY(0px);}
    50%{transform:translateY(20px);}
    100%{transform:translateY(0px);}
}

/* Container */
.container{
    position:relative;
    z-index:10;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Glass Card */
.card{
    width:90%;
    max-width:500px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 30px rgba(0,255,255,0.3);
    text-align:center;
    animation:fadeIn 2s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    font-size:42px;
    margin-bottom:10px;
    color:#00f2fe;
    text-shadow:0 0 20px cyan;
}

.subtitle{
    font-size:14px;
    opacity:0.8;
    margin-bottom:30px;
}

/* Buttons */
.btn{
    display:block;
    width:100%;
    padding:15px;
    margin:15px 0;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 20px rgba(0,255,255,0.5);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px cyan;
}

/* XP Bar */
.xp-box{
    margin-top:25px;
    text-align:left;
}

.xp-text{
    margin-bottom:8px;
    font-size:13px;
}

.xp-bar{
    width:100%;
    height:18px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}

.xp-fill{
    width:70%;
    height:100%;
    background:linear-gradient(90deg,#00f260,#0575e6);
    animation:xpAnim 3s infinite alternate;
}

@keyframes xpAnim{
    from{width:65%;}
    to{width:75%;}
}

/* Floating particles */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:particleMove linear infinite;
}

@keyframes particleMove{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

/* Footer */
.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.7;
}

</style>
</head>
<body>

<div class="stars"></div>
<div class="planet"></div>

<!-- Particles -->
<script>
for(let i=0;i<50;i++){
    const p=document.createElement('div');
    p.classList.add('particle');
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(5+Math.random()*10)+'s';
    p.style.opacity=Math.random();
    p.style.width=p.style.height=(2+Math.random()*5)+'px';
    document.body.appendChild(p);
}
</script>

<div class="container">
    <div class="card">
        <h1 class="title">QUIZ PLANET</h1>
        <p class="subtitle">
            Jelajahi planet dan jawab soal tanpa batas!
        </p>

        <button class="btn" onclick="startGame()">
            🚀 MULAI PETUALANGAN
        </button>

        <button class="btn">
            🏆 LEADERBOARD
        </button>

        <button class="btn">
            ⚙️ PENGATURAN
        </button>

        <div class="xp-box">
            <div class="xp-text">LEVEL 7 • XP 70%</div>
            <div class="xp-bar">
                <div class="xp-fill"></div>
            </div>
        </div>

        <div class="footer">
            © 2026 Quiz Planet Adventure
        </div>
    </div>
</div>

<!-- Music -->
<audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e0a5d8.mp3?filename=space-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>
function startGame(){
    alert("Game Dimulai!");
    // Ganti ke halaman quiz:
    // window.location.href = "quiz.html";
}
</script>

</body>
  </html>
